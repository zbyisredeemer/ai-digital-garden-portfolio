<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06111f" />
    <title>张本瑜｜在线简历</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root { color-scheme: dark; --bg:#06111f; --panel:rgba(15,23,42,.82); --text:#e6f6ff; --muted:#94a3b8; --cyan:#22d3ee; --green:#34d399; --gold:#facc15; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; color: var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at 20% 10%, rgba(34,211,238,.18), transparent 28%), linear-gradient(135deg, #020617, #06111f 48%, #0f172a); }
      .page { width: min(980px, calc(100% - 32px)); margin: 0 auto; padding: 40px 0 72px; }
      .topbar { position: sticky; top: 16px; z-index: 10; display: flex; justify-content: space-between; gap: 12px; align-items: center; padding: 14px 16px; border: 1px solid rgba(125,211,252,.24); border-radius: 22px; background: rgba(2,6,23,.76); backdrop-filter: blur(18px); box-shadow: 0 20px 60px rgba(0,0,0,.32); }
      .brand { display:flex; align-items:center; gap:12px; font-weight:900; }
      .brand img { width: 42px; height: 42px; border-radius: 14px; }
      .actions { display:flex; gap:10px; flex-wrap:wrap; }
      a, button { color: inherit; }
      .btn { border: 1px solid rgba(125,211,252,.32); border-radius: 999px; padding: 10px 14px; background: rgba(14,165,233,.1); text-decoration: none; font-weight: 800; cursor:pointer; }
      .btn.primary { color:#06111f; background: linear-gradient(135deg, var(--cyan), var(--green)); border:0; }
      .resume { margin-top: 24px; padding: 36px; border: 1px solid rgba(125,211,252,.22); border-radius: 28px; background: var(--panel); box-shadow: 0 24px 80px rgba(0,0,0,.34); }
      pre { margin: 0; white-space: pre-wrap; word-break: break-word; line-height: 1.82; font-size: 15.5px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Microsoft YaHei", monospace; }
      .hint { color: var(--muted); margin: 18px 4px 0; line-height: 1.7; }
      @media (max-width: 640px) { .topbar { align-items:flex-start; flex-direction:column; } .resume { padding: 22px; } pre { font-size: 14px; } }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="brand">
          <img src="/avatar.svg" alt="Benyu Zhang avatar" />
          <div>
            <div>张本瑜｜资深 Java 后端工程师</div>
            <small style="color:var(--muted)">Online Markdown Resume · UTF-8</small>
          </div>
        </div>
        <div class="actions">
          <a class="btn" href="/" rel="noreferrer">Back Home</a>
          <a class="btn primary" href="/resume-zhang-benyu.md" download>Download MD</a>
          <button class="btn" id="copyBtn" type="button">Copy</button>
        </div>
      </header>
      <p class="hint">这里是在线查看版本，直接读取完整 Markdown 简历并按 UTF-8 显示，避免浏览器直接打开 .md 时出现中文乱码。</p>
      <main class="resume"><pre id="resume">Loading resume...</pre></main>
    </div>
    <script>
      const resumeEl = document.getElementById('resume')
      fetch('/resume-zhang-benyu.md', { cache: 'no-store' })
        .then(res => res.text())
        .then(text => { resumeEl.textContent = text })
        .catch(() => { resumeEl.textContent = '简历加载失败，请点击 Download MD 下载查看。' })
      document.getElementById('copyBtn').addEventListener('click', async () => {
        await navigator.clipboard.writeText(resumeEl.textContent)
        document.getElementById('copyBtn').textContent = 'Copied'
      })
    </script>
  </body>
</html>
